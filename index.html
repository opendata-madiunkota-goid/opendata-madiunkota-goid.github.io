<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Open Data Kota Madiun</title>
	<link rel="icon" type="image/x-icon" href="https://ariefsatria2493.it.student.pens.ac.id/Project%20UAS/assets/favicon/icon%20projek.ico" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 4rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .title {
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-top: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin: 0;
        }
        .stat-label {
            font-size: 1.1rem;
            color: #666;
            margin: 5px 0 0;
        }
        .explore-btn {
            display: block;
            width: 250px;
            margin: 40px auto 0;
            padding: 15px 30px;
            background: #fff;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .explore-btn:hover {
            background: #667eea;
            color: #fff;
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .logo { font-size: 3rem; }
            .title { font-size: 2rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
		<a class="navbar-brand" href="#page-top"><img src="https://ariefsatria2493.it.student.pens.ac.id/Project%20UAS/assets/img/kharsimatik2%20fix.png" alt="logo" width="150" height="60"></a>
            <h1 class="title">Portal Open Data Kota Madiun</h1>
            <p class="subtitle">Akses data terbuka dari Pemerintah Kota Madiun untuk transparansi dan inovasi</p>
        </header>

        <section class="stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-database"></i>
                </div>
                <h2 class="stat-number">357</h2>
                <p class="stat-label">Dataset</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-building"></i>
                </div>
                <h2 class="stat-number">35</h2>
                <p class="stat-label">Organisasi</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tag"></i>
                </div>
                <h2 class="stat-number">169</h2>
                <p class="stat-label">Tag</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h2 class="stat-number">76.911</h2>
                <p class="stat-label">Pengunjung</p>
            </div>
        </section>

        <a href="#datasets" class="explore-btn">
            <i class="fas fa-search"></i> Jelajahi Dataset
        </a>
    </div>

    <footer>
        <p>&copy; 2026 Open Data Kota Madiun. Dibuat dengan <i class="fas fa-heart" style="color: #ff4757;"></i> untuk transparansi data.[web:1][web:2][page:0]</p>
    </footer>
</body>
</html>
